name: Build and Release LaTeX PDF

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latex-compiler image
        run: docker pull ghcr.io/${{ github.repository_owner }}/latex-compiler:latest

      - name: Build Satzung.pdf
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/src:/src" \
            -v "${{ github.workspace }}/dist:/dist" \
            ghcr.io/${{ github.repository_owner }}/latex-compiler:latest \
            /bin/bash -c "pdflatex -output-directory /dist /src/Satzung.tex && pdflatex -output-directory /dist /src/Satzung.tex"

      - name: Build Geschaeftsordnung.pdf
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/src:/src" \
            -v "${{ github.workspace }}/dist:/dist" \
            ghcr.io/${{ github.repository_owner }}/latex-compiler:latest \
            /bin/bash -c "pdflatex -output-directory /dist /src/Geschaeftsordnung.tex && pdflatex -output-directory /dist /src/Geschaeftsordnung.tex"

      - name: Build Beitragsordnung.pdf
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/src:/src" \
            -v "${{ github.workspace }}/dist:/dist" \
            ghcr.io/${{ github.repository_owner }}/latex-compiler:latest \
            /bin/bash -c "pdflatex -output-directory /dist /src/Beitragsordnung.tex && pdflatex -output-directory /dist /src/Beitragsordnung.tex"

      - name: Get current date
        id: date
        run: |
          echo "date=$(date +'%d.%m.%Y')" >> $GITHUB_OUTPUT

      - name: List artifacts
        run: |
          ls -al "${{ github.workspace }}/dist"

      - name: Create GitHub Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          tag: ${{ vars.date_of_resolution }}
          commit: ${{ github.sha }}
          name: "Satzung vom ${{ vars.date_of_resolution }} (Stand: ${{ steps.date.outputs.date }})"
          body: |
            Diese Satzung wurde durch die Mitgliederversammlung vom ${{ vars.date_of_resolution }} beschlossen.
            Entspricht der Release-Tag nicht dem Release-Datum, so handelt es sich um redaktionelle Änderungen.
          artifacts: "${{ github.workspace }}/dist/*.pdf"
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true

  deploy:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download PDFs from latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo ${{ github.repository }} --pattern "*.pdf"

      - name: Upload Satzung.pdf to plan-b-chor.de
        uses: SamKirkland/FTP-Deploy-Action@a51268f67f6605236975928ae28b0f7e9971d50a # v4.3.6
        with:
          server: ${{ secrets.ftp_host }}
          username: ${{ secrets.ftp_username }}
          password: ${{ secrets.ftp_password }}
          port: ${{ secrets.ftp_port }}
          protocol: ${{ secrets.ftp_protocol }}
          local-dir: ${{ vars.ftp_source_dir }}
          server-dir: ${{ vars.ftp_dest_dir }}
